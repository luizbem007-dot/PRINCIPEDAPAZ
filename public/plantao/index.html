<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Plantão Funerário 24h - Atendimento imediato para funerária Príncipe da Paz">
    <title>Plantão Funerário 24h - Atendimento Imediato</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 30px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(212, 175, 55, 0);
            }
        }

        /* Título Principal */
        h1 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin: 20px 0 0 0;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }
        }

        /* Subtítulo */
        .subtitle {
            font-size: 16px;
            line-height: 1.6;
            color: #d0d0d0;
            font-weight: 400;
            margin: 15px 0 0 0;
        }

        @media (max-width: 480px) {
            .subtitle {
                font-size: 15px;
            }
        }

        /* Seção do Botão */
        .cta-section {
            margin: 30px 0;
            animation: slideUp 0.8s ease-in-out 0.3s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Botão WhatsApp */
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: 700;
            background: #25D366;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
            width: 100%;
            max-width: 320px;
            position: relative;
            overflow: hidden;
        }

        .whatsapp-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .whatsapp-btn:hover {
            background: #1ecb4f;
            box-shadow: 0 12px 35px rgba(37, 211, 102, 0.5);
            transform: translateY(-3px);
        }

        .whatsapp-btn:hover:before {
            left: 100%;
        }

        .whatsapp-btn:active {
            transform: translateY(-1px);
        }

        /* Ícone Pulsante */
        .pulse-icon {
            display: inline-block;
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* Texto de Suporte */
        .support-text {
            font-size: 13px;
            color: #a0a0a0;
            margin-top: 15px;
            line-height: 1.5;
        }

        /* Rodapé */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #666666;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .container {
                gap: 25px;
                padding: 0 15px;
            }

            .whatsapp-btn {
                padding: 18px 30px;
                font-size: 16px;
            }

            h1 {
                font-size: 22px;
            }
        }

        /* Responsividade Extra Pequena */
        @media (max-height: 600px) {
            body {
                min-height: auto;
                padding: 15px;
            }

            .container {
                gap: 15px;
            }

            h1 {
                font-size: 20px;
                margin: 10px 0 0 0;
            }

            .subtitle {
                font-size: 14px;
                margin: 10px 0 0 0;
            }

            .whatsapp-btn {
                padding: 15px 25px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            ⚪
        </div>

        <!-- Título -->
        <h1>Plantão Funerário 24h: Atendimento Imediato</h1>

        <!-- Subtítulo -->
        <p class="subtitle">
            Perdeu um ente querido? Não se preocupe com a burocracia. Nossa equipe cuida de tudo para você com o máximo respeito.
        </p>

        <!-- Botão WhatsApp -->
        <div class="cta-section">
            <a href="https://wa.me/5527997363659" class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
                <span class="pulse-icon">🟢</span>
                LIGAR AGORA - (27) 99736-3659
            </a>
            <p class="support-text">
                Clique para abrir o WhatsApp<br>
                Resposta em menos de 1 minuto
            </p>
        </div>
    </div>

    <!-- Rodapé -->
    <footer>
        Príncipe da Paz - Atendimento 24 Horas
    </footer>

    <script>
        // Garante que a página carregue no topo
        window.addEventListener('load', function() {
            window.scrollTo(0, 0);
        });

        // Analytics simples (opcional)
        const btn = document.querySelector('.whatsapp-btn');
        btn.addEventListener('click', function() {
            if (typeof window.gtag !== 'undefined') {
                gtag('event', 'click_whatsapp_plantao', {
                    'phone': '5527997363659'
                });
            }
        });
    </script>
</body>
</html>
