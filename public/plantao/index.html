<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Plantão Funerário 24h - Atendimento imediato para Funerária Príncipe da Paz">
    <title>Plantão Funerário 24h - Atendimento Imediato</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #3E2723;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* Background Image */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1511632765486-a01980e01a18?q=80&w=2400');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.15;
            z-index: 1;
        }

        /* Overlay */
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(245, 240, 232, 0.95) 0%, rgba(255, 250, 245, 0.95) 100%);
            z-index: 2;
        }

        /* Header */
        .hero-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            z-index: 10;
        }

        .logo-header {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-header svg {
            width: 100%;
            height: 100%;
        }

        .contact-btn {
            background: #D4AF37;
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .contact-btn:hover {
            background: #C4A027;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        /* Content */
        .hero-content {
            position: relative;
            z-index: 5;
            max-width: 900px;
            padding: 60px 40px;
            margin: 0 auto;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            line-height: 1.2;
            color: #2C2C2C;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero-title .highlight {
            color: #D4AF37;
            font-weight: 900;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            line-height: 1.6;
            color: #5C5C5C;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-subtitle .highlight {
            color: #D4AF37;
            font-weight: 700;
        }

        /* CTA Button */
        .cta-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #D4AF37;
            color: white;
            padding: 18px 40px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
            margin: 0 auto 20px;
            display: inline-flex;
        }

        .cta-primary:hover {
            background: #C4A027;
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.45);
            transform: translateY(-3px);
        }

        .cta-primary:active {
            transform: translateY(-1px);
        }

        .whatsapp-icon {
            width: 20px;
            height: 20px;
        }

        /* Security Message */
        .security-message {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            color: #666;
            margin-top: 10px;
        }

        .security-message svg {
            width: 16px;
            height: 16px;
            color: #4CAF50;
        }

        .floating-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 40;
            animation: pulse-button 2s infinite;
        }

        .floating-button:hover {
            background: #C4A027;
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.5);
        }

        @keyframes pulse-button {
            0%, 100% {
                box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            }
            50% {
                box-shadow: 0 8px 35px rgba(212, 175, 55, 0.6);
            }
        }

        .floating-button svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .hero-header {
                padding: 16px 20px;
            }

            .logo-header {
                width: 40px;
                height: 40px;
            }

            .contact-btn {
                padding: 10px 20px;
                font-size: 13px;
            }

            .hero-content {
                padding: 40px 20px;
            }

            .hero-title {
                margin-bottom: 16px;
            }

            .hero-subtitle {
                margin-bottom: 32px;
            }

            .cta-primary {
                padding: 16px 32px;
                font-size: 1rem;
            }

            .floating-button {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }

            .floating-button svg {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 480px) {
            .hero-header {
                padding: 12px 16px;
            }

            .logo-header {
                width: 35px;
                height: 35px;
            }

            .contact-btn {
                display: none;
            }

            .hero-content {
                padding: 30px 16px;
            }

            .hero-title {
                font-size: 1.8rem;
                margin-bottom: 12px;
            }

            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 24px;
            }

            .cta-primary {
                padding: 14px 28px;
                font-size: 0.95rem;
                gap: 8px;
            }

            .whatsapp-icon {
                width: 18px;
                height: 18px;
            }

            .security-message {
                font-size: 0.85rem;
            }

            .floating-button {
                width: 50px;
                height: 50px;
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>
